# Complemento del plan canónico (`plan_2023_2027.yaml`): acciones e indicadores por OE.
# La app de «Carga directa» fusiona esto en memoria para armar los desplegables.
# Podés ampliar o corregir textos según el documento oficial del PEI.
por_oe:
  OG1-OE01:
    - id: OG1-OE01-A01
      texto: "Realizar un análisis de las diferentes áreas y funciones dentro de la universidad para identificar a los posibles referentes."
      indicadores:
        - id: OG1-OE01-A01-I01
          texto: "Número de Áreas y Funciones Analizadas"
    - id: OG1-OE01-A02
      texto: "Diseñar un programa de capacitación que cubra fundamentos del aseguramiento de la calidad, herramientas y mejores prácticas."
      indicadores:
        - id: OG1-OE01-A02-I01
          texto: "Porcentaje de Contenidos Cubiertos en el Programa de Capacitación"
    - id: OG1-OE01-A03
      texto: "Establecer un comité o grupo de trabajo dentro del equipo de referentes para el diseño del sistema, por áreas."
      indicadores:
        - id: OG1-OE01-A03-I01
          texto: "Conformación del Comité"
  OG1-OE02:
    - id: OG1-OE02-A01
